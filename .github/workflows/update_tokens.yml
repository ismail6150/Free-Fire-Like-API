name: Update Tokens

on:
  schedule:
    - cron: '0 */6 * * *'  # تشغيل تلقائي كل 6 ساعات
  workflow_dispatch:      # إمكانية التشغيل اليدوي

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run token update script
        run: python update_tokens.py # ⚠️ تأكد من اسم ملف البايثون لديك هنا

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add tokens.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update tokens [automated]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
